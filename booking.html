<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #2F5CFF;
            --bg-color: #ffffff;
            --secondary-bg: #F0F4FF;
            --text-color: #000000;
            --disabled-bg: #F8F8F8;
            --disabled-text: #D0D0D0;
            --inactive-text: #888888;
            --card-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            color: var(--text-color);
        }

        .container { width: 100%; max-width: 400px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 38px; font-weight: 800; line-height: 1.1; margin: 30px 0 35px 0; letter-spacing: -1.5px; }

        .card { background: #fff; border-radius: 35px; padding: 25px; box-shadow: var(--card-shadow); border: 1px solid #f0f0f0; }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; font-weight: 800; margin-bottom: 25px; font-size: 17px; }

        .back-to-main { display: inline-flex; align-items: center; gap: 4px; color: var(--primary-color); font-weight: 600; font-size: 16px; cursor: pointer; margin-bottom: 10px; transition: opacity 0.2s; padding: 5px 0; }
        .back-to-main span { font-size: 24px; line-height: 0; margin-top: -2px; }
        .back-to-main:active { opacity: 0.6; }

        .nav-arrow { width: 32px; height: 32px; background: var(--disabled-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: 0.2s; color: var(--text-color); }
        .nav-arrow:active { transform: scale(0.9); background: var(--secondary-bg); }

        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .weekday { font-size: 12px; font-weight: 700; margin-bottom: 10px; color: var(--disabled-text); text-transform: uppercase; }
        
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 14px; cursor: pointer; font-size: 15px; transition: 0.2s; font-weight: 600; }
        .day.past { color: var(--disabled-text); cursor: default; font-weight: 400; }
        .day.selected { background: var(--primary-color) !important; color: white !important; box-shadow: 0 8px 15px rgba(47, 92, 255, 0.3); }

        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        .time-slot { background: var(--disabled-bg); padding: 15px 5px; border-radius: 18px; font-size: 13px; color: var(--text-color); border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; transition: 0.2s; }
        .time-slot.selected { background: var(--primary-color); color: white; box-shadow: 0 8px 15px rgba(47, 92, 255, 0.3); }
        
        .time-slot.booked { background: #F0F0F0 !important; color: #B0B0B0 !important; cursor: not-allowed; box-shadow: none !important; border: 1px dashed #DDD; }

        .night-divider { grid-column: 1 / -1; display: flex; align-items: center; gap: 10px; margin: 20px 0 10px; font-size: 11px; font-weight: 800; color: var(--disabled-text); text-transform: uppercase; letter-spacing: 1px; }
        .night-divider::after { content: ""; flex: 1; height: 1px; background: #eee; }

        .next-btn { margin-top: 30px; width: 100%; padding: 20px; border-radius: 24px; border: none; background: var(--disabled-bg); color: var(--disabled-text); font-size: 17px; font-weight: 700; transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); position: relative; }
        .next-btn.active { background: var(--primary-color); color: white; box-shadow: 0 10px 25px rgba(47, 92, 255, 0.2); cursor: pointer; }
        
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; position: absolute; left: 50%; top: 50%; margin: -10px 0 0 -10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading span { opacity: 0; }
        .loading .spinner { display: block; }

        .hidden { display: none; }
    </style> 
</head>
<body>

<div class="container">
    <div class="back-to-main" onclick="location.href='index.html'">
        <span>‹</span> На главную
    </div>

    <div id="step-date">
        <h1>Когда запишемся?</h1>
        <div class="card">
            <div class="calendar-header">
                <div class="nav-arrow" onclick="changeMonth(-1)">‹</div>
                <span id="month-label"></span>
                <div class="nav-arrow" onclick="changeMonth(1)">›</div>
            </div>
            <div class="days-grid" id="calendar-days"></div>
            <button id="btn-to-time" class="next-btn">
                <span>Выбрать время</span>
                <div class="spinner"></div>
            </button>
        </div>
    </div>

    <div id="step-time" class="hidden">
        <h1>Свободные часы</h1>
        <div class="card">
            <div class="calendar-header">
                <div class="nav-arrow" onclick="showStep(1)">✕</div>
                <span id="selected-date-title"></span>
                <div style="width:32px"></div>
            </div>
            <div class="time-grid" id="time-container"></div>
            <button id="btn-finish" class="next-btn">
                <span>Забронировать</span>
                <div class="spinner"></div>
            </button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    let currentViewDate = new Date();
    let selectedFullDate = null;
    let selectedSlots = [];
    window.busySlots = [];
    
    const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
    const monthNamesGenitive = ["января", "февраля", "марта", "апреля", "мая", "июня", "июля", "августа", "сентября", "октября", "ноября", "декабря"];
    
    function init() {
        renderCalendar();
        document.getElementById('btn-to-time').onclick = () => { if(selectedFullDate) showStep(2); };
        document.getElementById('btn-finish').onclick = () => { if(selectedSlots.length > 0) goToCheckout(); };
    }
    
    function renderCalendar() {
        const grid = document.getElementById('calendar-days');
        const label = document.getElementById('month-label');
        grid.innerHTML = '';
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        label.innerText = `${monthNames[month]} ${year}`;
    
        ['пн','вт','ср','чт','пт','сб','вс'].forEach(d => {
            const div = document.createElement('div');
            div.className = 'weekday';
            div.innerText = d;
            grid.appendChild(div);
        });
    
        const firstDay = new Date(year, month, 1).getDay();
        const offset = firstDay === 0 ? 6 : firstDay - 1;
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const today = new Date();
        today.setHours(0,0,0,0);
    
        for(let i=0; i<offset; i++) grid.appendChild(Object.assign(document.createElement('div'), {className: 'day empty'}));
    
        for(let d=1; d<=daysInMonth; d++) {
            const dateObj = new Date(year, month, d);
            const el = document.createElement('div');
            el.className = 'day';
            el.innerText = d;
            if (dateObj < today) {
                el.classList.add('past');
            } else {
                if (selectedFullDate && dateObj.getTime() === selectedFullDate.getTime()) el.classList.add('selected');
                el.onclick = () => {
                    selectedFullDate = dateObj;
                    renderCalendar();
                    document.getElementById('btn-to-time').classList.add('active');
                };
            }
            grid.appendChild(el);
        }
    }
    
    function renderTimeSlots() {
        const container = document.getElementById('time-container');
        container.innerHTML = '';
        selectedSlots = [];
        document.getElementById('btn-finish').classList.remove('active');

        for (let i = 0; i < 30; i++) {
            if (i === 24) {
                const divider = document.createElement('div');
                divider.className = 'night-divider';
                divider.innerText = "Следующий день";
                container.appendChild(divider);
            }

            const hour = i % 24;
            const start = hour < 10 ? `0${hour}:00` : `${hour}:00`;
            
            const btn = document.createElement('button');
            btn.className = 'time-slot';
            btn.dataset.index = i;
            if (i >= 24) btn.classList.add('next-day-slot');

            // Проверка на занятость (сравниваем с индексами 0-29)
            const isBooked = window.busySlots && window.busySlots.includes(i);

            if (isBooked) {
                btn.classList.add('booked');
                btn.innerText = `${start} • Занято`;
                btn.disabled = true;
            } else {
                btn.innerText = start;
                btn.onclick = function() {
                    const index = parseInt(this.dataset.index);
                    handleSlotSelection(index); // Теперь эта функция определена ниже
                };
            }
            container.appendChild(btn);
        }
    }

    // ВОТ ЭТА ФУНКЦИЯ БЫЛА ПРОПУЩЕНА:
    function handleSlotSelection(index) {
        if (index >= 24 && !selectedSlots.includes(23)) {
            tg.showAlert("Слоты следующего дня доступны только после 23:00");
            return;
        }

        if (selectedSlots.length === 0) {
            selectedSlots.push(index);
        } else {
            const min = Math.min(...selectedSlots);
            const max = Math.max(...selectedSlots);

            if (selectedSlots.includes(index)) {
                // Если кликнули по уже выбранному
                if (index === 23 && selectedSlots.some(i => i >= 24)) {
                    tg.showAlert("Сначала отмените слоты следующего дня");
                    return;
                }
                if (index === min || index === max) {
                    selectedSlots = selectedSlots.filter(s => s !== index);
                } else {
                    selectedSlots = [index];
                }
            } else {
                // Выбор диапазона
                const newMin = Math.min(min, index);
                const newMax = Math.max(max, index);
                selectedSlots = [];
                for (let k = newMin; k <= newMax; k++) {
                    // Проверяем, нет ли занятых слотов внутри диапазона
                    if (window.busySlots.includes(k)) {
                        tg.showAlert("В выбранном диапазоне есть занятое время");
                        selectedSlots = [index]; // Сбрасываем на один выбранный слот
                        break;
                    }
                    selectedSlots.push(k);
                }
            }
        }
        
        updateSlotSelection();
        
        const finishBtn = document.getElementById('btn-finish');
        if (selectedSlots.length > 0) {
            finishBtn.classList.add('active');
        } else {
            finishBtn.classList.remove('active');
        }
    }
    
    function updateSlotSelection() {
        document.querySelectorAll('.time-slot').forEach(btn => {
            const idx = parseInt(btn.dataset.index);
            selectedSlots.includes(idx) ? btn.classList.add('selected') : btn.classList.remove('selected');
        });
    }

    async function showStep(step) {
        if (step === 2) {
            const btn = document.getElementById('btn-to-time');
            btn.classList.add('loading');
            
            const year = selectedFullDate.getFullYear();
            const month = String(selectedFullDate.getMonth() + 1).padStart(2, '0');
            const day = String(selectedFullDate.getDate()).padStart(2, '0');
            const dateStr = `${year}-${month}-${day}`;
    
            try {
                // Извлекаем данные пользователя из Telegram Web App
                const user = tg.initDataUnsafe.user || {};
                const userId = user.id || '';
                const username = user.username || '';
    
                // Добавляем параметры в URL: date, userId и username
                const params = new URLSearchParams(window.location.search);
                const studioType = localStorage.getItem('selectedStudio') || 'mini';
                // Добавь &studio=${studioType} в твой fetch запрос к n8n
                const url = `https://n8ndex.ru/webhook-test/calendar?date=${dateStr}&studio=${studioType}&userId=${userId}&username=${encodeURIComponent(username)}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                const rawString = data.busyHoursList || "";
                window.busySlots = []; 
    
                if (rawString.trim().length > 0) {
                    window.busySlots = rawString.split(',').map(slot => {
                        return parseInt(slot.trim().split(':')[0]); 
                    });
                }
                
                // ... остальная логика переключения шагов ...
                document.getElementById('step-date').classList.add('hidden');
                document.getElementById('step-time').classList.remove('hidden');
                document.getElementById('selected-date-title').innerText = `${selectedFullDate.getDate()} ${monthNamesGenitive[selectedFullDate.getMonth()]}`;
                
                renderTimeSlots();
        
            } catch (e) {
                tg.showAlert("Не удалось проверить свободное время.");
            } finally {
                btn.classList.remove('loading');
            }
        } else {
            document.getElementById('step-time').classList.add('hidden');
            document.getElementById('step-date').classList.remove('hidden');
        }
    }
    
    function changeMonth(dir) {
        currentViewDate.setMonth(currentViewDate.getMonth() + dir);
        renderCalendar();
    }
    
    // Внутри booking.html замени переход на этот блок:
    function goToCheckout() {
        if (!selectedFullDate || selectedSlots.length === 0) {
            tg.showAlert("Сначала выберите дату и время");
            return;
        }
    
        // 1. Форматируем дату в понятный текст (например, "12 апреля")
        const day = selectedFullDate.getDate();
        const month = monthNamesGenitive[selectedFullDate.getMonth()];
        const year = selectedFullDate.getFullYear();
        const dateText = `${day} ${month} ${year}`;

        const monthNum = String(selectedFullDate.getMonth() + 1).padStart(2, '0');
        const dayNum = String(selectedFullDate.getDate()).padStart(2, '0');
        const rawDate = `${year}-${monthNum}-${dayNum}`;
    
        // 2. Сохраняем в localStorage под правильными ключами
        localStorage.setItem('selectedDate', dateText); // Сохраняем текст для отображения
        localStorage.setItem('selectedDateRaw', rawDate);
        localStorage.setItem('selectedSlots', JSON.stringify(selectedSlots)); // Сохраняем массив слотов
        
        // 3. Переходим
        window.location.href = 'done.html';
    }
    init();
</script>
</body>
</html>
