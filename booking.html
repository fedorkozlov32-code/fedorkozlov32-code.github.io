<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #2F5CFF;
            --bg-color: #ffffff;
            --secondary-bg: #F0F4FF;
            --text-color: #000000;
            --disabled-bg: #F8F8F8;
            --disabled-text: #D0D0D0;
            --inactive-text: #888888;
            --card-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            color: var(--text-color);
        }

        .container { width: 100%; max-width: 400px; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { 
            font-size: 38px; 
            font-weight: 800; 
            line-height: 1.1; 
            margin: 30px 0 35px 0; 
            letter-spacing: -1.5px;
        }

        .card {
            background: #fff;
            border-radius: 35px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            border: 1px solid #f0f0f0;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
            margin-bottom: 25px;
            font-size: 17px;
        }

        /* --- ИСПРАВЛЕННЫЙ БЛОК ДЛЯ СТРЕЛОЧЕК --- */
        .nav-arrow { 
            width: 32px;
            height: 32px;
            background: var(--disabled-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px; /* Немного увеличили размер шрифта для стрелки */
            transition: 0.2s;
            color: var(--text-color); /* Сделали стрелку черной */
        }
        .nav-arrow:active { transform: scale(0.9); background: var(--secondary-bg); }
        /* -------------------------------------- */

        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .weekday { font-size: 12px; font-weight: 700; margin-bottom: 10px; color: var(--disabled-text); text-transform: uppercase; }
        
        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
            font-weight: 600;
        }

        .day.past { color: var(--disabled-text); cursor: default; font-weight: 400; }
        .day.selected { background: var(--primary-color) !important; color: white !important; box-shadow: 0 8px 15px rgba(47, 92, 255, 0.3); }

        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        .time-slot {
            background: var(--disabled-bg);
            padding: 15px 5px;
            border-radius: 18px;
            font-size: 13px;
            color: var(--text-color);
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            transition: 0.2s;
        }

        .time-slot.selected { background: var(--primary-color); color: white; box-shadow: 0 8px 15px rgba(47, 92, 255, 0.3); }

        .night-divider {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 10px;
            font-size: 11px;
            font-weight: 800;
            color: var(--disabled-text);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .night-divider::after { content: ""; flex: 1; height: 1px; background: #eee; }

        .next-btn {
            margin-top: 30px;
            width: 100%;
            padding: 20px;
            border-radius: 24px;
            border: none;
            background: var(--disabled-bg);
            color: var(--disabled-text);
            font-size: 17px;
            font-weight: 700;
            transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .next-btn.active { 
            background: var(--primary-color); 
            color: white; 
            box-shadow: 0 10px 25px rgba(47, 92, 255, 0.2); 
        }
        
        .next-btn:active { transform: scale(0.97); }

        .hidden { display: none; }

        /* Spinner для загрузки */
        .spinner {
            display: none; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%; border-top-color: #fff;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .spinner { display: block; }
        .loading span { display: none; }
    </style> 
</head>
<body>

<div class="container">
    <div id="step-date">
        <h1>Когда запишемся?</h1>
        <div class="card">
            <div class="calendar-header">
                <div class="nav-arrow" onclick="changeMonth(-1)">✕</div>
                <span id="month-label"></span>
                <div class="nav-arrow" onclick="changeMonth(1)">✕</div>
            </div>
            <div class="days-grid" id="calendar-days"></div>
            <button id="btn-to-time" class="next-btn"><span>Выбрать время</span></button>
        </div>
    </div>

    <div id="step-time" class="hidden">
        <h1>Свободные часы</h1>
        <div class="card">
            <div class="calendar-header">
                <div class="nav-arrow" onclick="showStep(1)">✕</div>
                <span id="selected-date-title"></span>
                <div style="width:32px"></div>
            </div>
            <div class="time-grid" id="time-container"></div>
            <button id="btn-finish" class="next-btn">
                <span>Забронировать</span>
                <div class="spinner"></div>
            </button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    let currentViewDate = new Date();
    let selectedFullDate = null;
    let selectedSlots = [];
    
    const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
    const monthNamesGenitive = ["января", "февраля", "марта", "апреля", "мая", "июня", "июля", "августа", "сентября", "октября", "ноября", "декабря"];
    
    function init() {
        renderCalendar();
        document.getElementById('btn-to-time').onclick = () => { if(selectedFullDate) showStep(2); };
        document.getElementById('btn-finish').onclick = () => { if(selectedSlots.length > 0) sendToBot(); };
    }
    
    function renderCalendar() {
        const grid = document.getElementById('calendar-days');
        const label = document.getElementById('month-label');
        grid.innerHTML = '';
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        label.innerText = `${monthNames[month]} ${year}`;
    
        ['пн','вт','ср','чт','пт','сб','вс'].forEach(d => {
            const div = document.createElement('div');
            div.className = 'weekday';
            div.innerText = d;
            grid.appendChild(div);
        });
    
        const firstDay = new Date(year, month, 1).getDay();
        const offset = firstDay === 0 ? 6 : firstDay - 1;
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const today = new Date();
        today.setHours(0,0,0,0);
    
        for(let i=0; i<offset; i++) grid.appendChild(Object.assign(document.createElement('div'), {className: 'day empty'}));
    
        for(let d=1; d<=daysInMonth; d++) {
            const dateObj = new Date(year, month, d);
            const el = document.createElement('div');
            el.className = 'day';
            el.innerText = d;
            if (dateObj < today) {
                el.classList.add('past');
            } else {
                if (selectedFullDate && dateObj.getTime() === selectedFullDate.getTime()) el.classList.add('selected');
                el.onclick = () => {
                    selectedFullDate = dateObj;
                    renderCalendar();
                    document.getElementById('btn-to-time').classList.add('active');
                };
            }
            grid.appendChild(el);
        }
    }
    
    function renderTimeSlots() {
        const container = document.getElementById('time-container');
        container.innerHTML = '';
        selectedSlots = [];
        document.getElementById('btn-finish').classList.remove('active');
    
        for (let i = 0; i < 30; i++) {
            if (i === 24) {
                const divider = document.createElement('div');
                divider.className = 'night-divider';
                divider.innerText = 'Следующий день';
                container.appendChild(divider);
            }
            const hour = i % 24;
            const start = hour < 10 ? `0${hour}:00` : `${hour}:00`;
            const btn = document.createElement('button');
            btn.className = 'time-slot';
            btn.innerText = start;
            btn.dataset.index = i;
            btn.onclick = function() {
                const index = parseInt(this.dataset.index);
                if (index >= 24 && !selectedSlots.includes(23)) {
                    tg.showAlert("Слоты следующего дня доступны только после 23:00");
                    return;
                }
                if (selectedSlots.length === 0) {
                    selectedSlots.push(index);
                } else {
                    const min = Math.min(...selectedSlots);
                    const max = Math.max(...selectedSlots);
                    if (selectedSlots.includes(index)) {
                        if (index === 23 && selectedSlots.some(i => i >= 24)) {
                            tg.showAlert("Сначала отмените слоты следующего дня");
                            return;
                        }
                        if (index === min || index === max) {
                            selectedSlots = selectedSlots.filter(s => s !== index);
                        } else {
                            selectedSlots = [index];
                        }
                    } else {
                        const newMin = Math.min(min, index);
                        const newMax = Math.max(max, index);
                        selectedSlots = [];
                        for (let k = newMin; k <= newMax; k++) selectedSlots.push(k);
                    }
                }
                updateSlotSelection();
                const finishBtn = document.getElementById('btn-finish');
                selectedSlots.length > 0 ? finishBtn.classList.add('active') : finishBtn.classList.remove('active');
            };
            container.appendChild(btn);
        }
    }
    
    function updateSlotSelection() {
        document.querySelectorAll('.time-slot').forEach(btn => {
            const idx = parseInt(btn.dataset.index);
            selectedSlots.includes(idx) ? btn.classList.add('selected') : btn.classList.remove('selected');
        });
    }

    function showStep(step) {
        if (step === 2) {
            document.getElementById('step-date').classList.add('hidden');
            document.getElementById('step-time').classList.remove('hidden');
            document.getElementById('selected-date-title').innerText = `${selectedFullDate.getDate()} ${monthNamesGenitive[selectedFullDate.getMonth()]}`;
            renderTimeSlots();
        } else {
            document.getElementById('step-time').classList.add('hidden');
            document.getElementById('step-date').classList.remove('hidden');
        }
    }
    
    function changeMonth(dir) {
        currentViewDate.setMonth(currentViewDate.getMonth() + dir);
        renderCalendar();
    }
    
    async function sendToBot() {
        const btn = document.getElementById('btn-finish');
        btn.classList.add('loading');
        selectedSlots.sort((a, b) => a - b);
        const year = selectedFullDate.getFullYear();
        const month = String(selectedFullDate.getMonth() + 1).padStart(2, '0');
        const day = String(selectedFullDate.getDate()).padStart(2, '0');
        const bookingData = {
            user: tg.initDataUnsafe.user,
            date: `${year}-${month}-${day}`,
            slots: selectedSlots,
            duration: selectedSlots.length
        };
        try {
            const response = await fetch('https://n8ndex.ru/webhook-test/4b890fd5-6b71-480b-9c18-60eb4d5a9138', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookingData)
            });
            if (response.ok) { window.location.href = 'done.html'; } 
            else { throw new Error(); }
        } catch (e) {
            tg.showAlert("Ошибка связи с сервером");
            btn.classList.remove('loading');
        }
    }
    init();
</script>
</body>
</html>
