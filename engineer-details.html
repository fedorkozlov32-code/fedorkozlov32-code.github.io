<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Детали инженера</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #2F5CFF;
            --bg: #ffffff;
            --secondary-bg: #F2F5FF;
            --text-main: #000000;
            --text-gray: #636366;
            --accent-gradient: linear-gradient(135deg, #2F5CFF 0%, #6E8EFF 100%);
            --card-radius: 24px;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            padding-bottom: 120px; /* Место под кнопку */
            -webkit-tap-highlight-color: transparent;
        }

        /* Hero секция с фото */
        .hero {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 150px;
            background: linear-gradient(to top, var(--bg), transparent);
        }

        /* Контент */
        .content {
            padding: 0 20px;
            margin-top: -40px;
            position: relative;
            z-index: 2;
        }

        .badge {
            display: inline-block;
            background: var(--accent-gradient);
            color: white;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        h1 { font-size: 42px; font-weight: 900; margin: 0; letter-spacing: -2px; line-height: 1; }
        .nickname { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 25px; display: block; }

        /* Блоки с инфой */
        .section-title {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-gray);
            letter-spacing: 1px;
            margin: 30px 0 15px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-card {
            background: var(--secondary-bg);
            border-radius: var(--card-radius);
            padding: 20px;
            margin-bottom: 15px;
        }

        .worked-with { font-weight: 600; font-size: 15px; line-height: 1.5; color: #333; }
        .desc-text { font-size: 16px; line-height: 1.6; color: #444; }

        /* Сетка статов */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .stat-box {
            background: #fff;
            border: 1px solid #E5E9F2;
            padding: 16px;
            border-radius: 20px;
        }
        .stat-label { font-size: 11px; color: var(--text-gray); font-weight: 600; display: block; margin-bottom: 4px; }
        .stat-value { font-weight: 800; font-size: 16px; color: var(--primary); }

        /* Прайс лист */
        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .price-item:last-child { border-bottom: none; }
        .price-name { font-weight: 600; font-size: 15px; }
        .price-value { font-weight: 800; color: var(--primary); }

        /* Кнопки снизу */
        .footer-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(15px);
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .btn {
            height: 64px;
            border-radius: 22px;
            border: none;
            font-weight: 800;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-confirm {
            flex: 1;
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(47, 92, 255, 0.2);
        }
        .btn-back {
            width: 64px;
            background: #F0F0F0;
            color: black;
        }
        .btn:active { transform: scale(0.96); }

    </style>
</head>
<body>

<div id="app">
    <div class="hero">
        <img id="eng-pic" src="" alt="Photo">
        <div class="hero-overlay"></div>
    </div>

    <div class="content">
        <div class="badge">Omni Team</div>
        <h1 id="eng-name">—</h1>
        <span id="eng-nick" class="nickname">—</span>

        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-label">ОПЫТ</span>
                <span class="stat-value" id="eng-exp">—</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">СОФТ</span>
                <span class="stat-value" id="eng-soft">—</span>
            </div>
        </div>

        <div class="section-title">🚀 Работал с</div>
        <div class="info-card">
            <div class="worked-with" id="eng-clients">—</div>
        </div>

        <div class="section-title">💡 О себе</div>
        <div class="info-card">
            <div class="desc-text" id="eng-about">—</div>
        </div>

        <div class="section-title">🧾 Прайс-лист</div>
        <div class="info-card" id="price-list">
            </div>
    </div>

    <div class="footer-actions">
        <button class="btn btn-back" onclick="history.back()">‹</button>
        <button class="btn btn-confirm" onclick="confirmSelection()">Выбрать инженера</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const engineersData = {
        'Misha Omni': {
            img: 'img/eng_misha.jpg',
            exp: '6 лет',
            soft: 'Logic, FL, Ableton',
            clients: 'Rakhim, DILARA, SODA LUV, BAELI, xxxmanera, josodo, Nikitsunami, Kinderlil, SEEYASIDE, haijin, блинк, Blessq, Flamebaby...',
            about: 'Создал Omni Studio. Лучший вариант работы — создать трек с нуля прямо на студии. Запишем живые гитары, синты и вместе придумаем аранжировку. Доведу любую идею до площадок!',
            prices: [
                { name: 'Сведение + Мастеринг', val: '15.000 ₽' },
                { name: 'Бит с нуля (Exclusive)', val: '15.000 ₽' },
                { name: 'Обучение', val: 'от 5.000 ₽/ч' }
            ]
        },
        'Vanya 1side': {
            img: 'img/eng_vanya.jpg',
            exp: '5 лет',
            soft: 'Logic Pro, FL Studio',
            clients: 'Платина, Og Buda, Mayot, YUNGWAY, Полка, Maladoy Prince, Shiny Ruby, STOPBAN, Eikko, Redda, Jayx, Yetii...',
            about: 'Жесткий гик и программист. Крутит плагины не наугад, а как спиннеры. Главное — поймать общий вайб, чтобы сессия прошла легко. Сделаем с душой!',
            prices: [
                { name: 'Сведение + Мастеринг', val: '7.500 ₽' },
                { name: 'Бит с нуля (Exclusive)', val: '7.500 ₽' },
                { name: 'Обучение', val: 'от 3.000 ₽/ч' }
            ]
        },
        'Serega Slitee': {
            img: 'img/eng_serega.jpg',
            exp: '6 лет',
            soft: 'Logic, FL, Cubase',
            clients: 'Playboi Carti, Ken Carson, Homixide Gang, $uicideboy$, Scally Milano, Uglystephan, Xxxmanera, Code80...',
            about: 'Работал с артистами мировой сцены. Может сделать грязно и нагло или чисто и дорого. Записывает живую гитару. Главный апгрейд — практика и уши.',
            prices: [
                { name: 'Сведение + Мастеринг', val: '7.500 ₽' },
                { name: 'Бит с нуля (Exclusive)', val: '15.000 ₽' },
                { name: 'Обучение', val: 'от 3.000 ₽/ч' }
            ]
        },
        'Matvey Maite': {
            img: 'img/eng_matvey.jpg',
            exp: '10+ лет',
            soft: 'Ableton, FL, Logic',
            clients: 'Его эдиты играет каждый уважающий себя диджей в СНГ.',
            about: 'Саунд-продюсер с огромным опытом. Знает, как связать диджеинг и написание битов. Соберает трек в цельную, конкурентную работу без заумных терминов.',
            prices: [
                { name: 'Сведение + Мастеринг', val: '7.500 ₽' },
                { name: 'Бит с нуля (Exclusive)', val: '7.500 ₽' },
                { name: 'Обучение', val: 'от 3.000 ₽/ч' }
            ]
        },
        'Stepa Vivienne': {
            img: 'img/eng_stepa.jpg',
            exp: '4 года',
            soft: 'Logic Pro, FL Studio',
            clients: 'Nikitsunami, Kinderlil, SEEYASIDE, haijin, huzzy b, блинк, Blessq, Flamebaby, Roksii...',
            about: 'Креативный директор Omni. Проведет по всем этапам: от записи до съемки сниппетов и создания обложки. Знает всё о продвижении и наборе прослушиваний.',
            prices: [
                { name: 'Сведение + Мастеринг', val: '7.500 ₽' },
                { name: 'Консультация', val: 'По запросу' }
            ]
        },
        'Vlad Sonic': {
            img: 'img/eng_vlad.jpg',
            exp: '11 лет (биты)',
            soft: 'Logic Pro, FL Studio',
            clients: 'Aarne, Элджей, LIL KRYSTALLL, Boulevard Depo, WhitePunk, SODA LUV, The Limba, JEEMBO...',
            about: 'Гик FL Studio, сотрудничал с зарубежными артистами. Мультижанровый мачо: напишет бит с нуля за несколько минут. Работает дистанционно.',
            prices: [
                { name: 'Бит с нуля (Exclusive)', val: '10.000 ₽' },
                { name: 'Доработка бита', val: '7.500 ₽' },
                { name: 'Сведение (Дистанц.)', val: '10.000 ₽' }
            ]
        }
    };

    function init() {
        const name = localStorage.getItem('temp_eng_name');
        const engineer = engineersData[name];

        if (engineer) {
            document.getElementById('eng-pic').src = engineer.img;
            document.getElementById('eng-name').innerText = name.split(' ')[0];
            document.getElementById('eng-nick').innerText = name.split(' ')[1] || '';
            document.getElementById('eng-exp').innerText = engineer.exp;
            document.getElementById('eng-soft').innerText = engineer.soft;
            document.getElementById('eng-clients').innerText = engineer.clients;
            document.getElementById('eng-about').innerText = engineer.about;

            const priceContainer = document.getElementById('price-list');
            priceContainer.innerHTML = engineer.prices.map(p => `
                <div class="price-item">
                    <span class="price-name">${p.name}</span>
                    <span class="price-value">${p.val}</span>
                </div>
            `).join('');
        }
    }

    function confirmSelection() {
        const name = localStorage.getItem('temp_eng_name');
        const price = localStorage.getItem('temp_eng_price');
        localStorage.setItem('selectedEngineer', name);
        localStorage.setItem('engineerPrice', price);
        location.href = 'studio.html';
    }

    init();
</script>
</body>
</html>
