<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Об инженере</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2F5CFF; --bg: #ffffff; --gray: #8E8E93; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #000; }
        
        .hero-image {
            width: 100%;
            height: 45vh;
            object-fit: cover;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .content { padding: 30px 20px; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .nickname { color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; }
        h1 { font-size: 38px; font-weight: 900; margin: 5px 0 20px 0; letter-spacing: -1.5px; }
        
        .description { font-size: 17px; line-height: 1.6; color: #333; margin-bottom: 30px; }

        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-item { background: #F5F7FF; padding: 15px; border-radius: 20px; flex: 1; }
        .stat-label { font-size: 12px; color: var(--gray); display: block; margin-bottom: 5px; }
        .stat-value { font-weight: 700; font-size: 18px; }

        .bottom-bar {
            position: fixed;
            bottom: 0; width: 100%;
            padding: 20px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            display: flex; gap: 10px;
        }

        .btn {
            flex: 1; padding: 20px; border-radius: 22px; font-weight: 700; font-size: 16px;
            border: none; cursor: pointer; transition: 0.2s;
        }
        .btn-main { background: var(--primary); color: #fff; }
        .btn-back { background: #f0f0f0; color: #000; width: 60px; flex: none; }
    </style>
</head>
<body>

<img id="eng-pic" src="" class="hero-image">

<div class="content">
    <span id="eng-nick" class="nickname"></span>
    <h1 id="eng-name"></h1>
    
    <div class="stats">
        <div class="stat-item">
            <span class="stat-label">Опыт</span>
            <span class="stat-value" id="eng-exp">5+ лет</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Цена / час</span>
            <span class="stat-value" id="eng-price"></span>
        </div>
    </div>

    <p id="eng-desc" class="description"></p>
</div>

<div class="bottom-bar">
    <button class="btn btn-back" onclick="history.back()">‹</button>
    <button class="btn btn-main" onclick="confirmSelection()">Выбрать его</button>
</div>

<script>
    // База данных описаний
    const data = {
        'Misha Omni': {
            desc: 'Топовый инженер студии. Работал с крупными артистами, специализируется на агрессивном миксе и идеальном тюне. Сделает твой трек готовым к чартам.',
            exp: '6 лет',
            img: 'img/eng_misha.jpg'
        },
        'Vanya 1side': {
            desc: 'Мастер атмосферного звучания. Если тебе нужен объемный реверб и мягкий вокал — тебе к Ване. Профессионал в жанрах Indie и Melodic Trap.',
            exp: '4 года',
            img: 'img/eng_vanya.jpg'
        }
        // ... добавь остальных так же
    };

    const name = localStorage.getItem('temp_eng_name');
    const price = localStorage.getItem('temp_eng_price');
    const engineer = data[name];

    if (engineer) {
        document.getElementById('eng-name').innerText = name.split(' ')[0];
        document.getElementById('eng-nick').innerText = name.split(' ')[1];
        document.getElementById('eng-desc').innerText = engineer.desc;
        document.getElementById('eng-price').innerText = price + '₽';
        document.getElementById('eng-exp').innerText = engineer.exp;
        document.getElementById('eng-pic').src = engineer.img;
    }

    function confirmSelection() {
        // Окончательно сохраняем и идем в студию
        localStorage.setItem('selectedEngineer', name);
        localStorage.setItem('engineerPrice', price);
        location.href = 'studio.html';
    }
</script>
</body>
</html>
