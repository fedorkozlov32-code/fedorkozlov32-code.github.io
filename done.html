<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Подтверждение бронирования</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #2F5CFF;
            --bg-color: #ffffff;
            --secondary-bg: #F5F7FF;
            --text-color: #000000;
            --gray-text: #8E8E93;
            --card-shadow: 0 20px 40px rgba(0,0,0,0.06);
            --border-color: #F0F0F0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 400px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 34px; font-weight: 800; letter-spacing: -1.2px; margin: 20px 0 30px 0; line-height: 1.1; }

        .summary-card {
            background: #fff;
            border-radius: 30px;
            padding: 24px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .info-row:last-child { border-bottom: none; }

        .label { color: var(--gray-text); font-weight: 500; font-size: 15px; }
        .value { font-weight: 700; font-size: 16px; text-align: right; }

        .total-section {
            background: var(--secondary-bg);
            border-radius: 20px;
            padding: 20px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-label { font-weight: 600; color: var(--primary-color); }
        .total-price { font-size: 22px; font-weight: 800; color: var(--primary-color); }

        .button-group { display: flex; flex-direction: column; gap: 12px; margin-top: 40px; }

        .btn {
            padding: 20px;
            border-radius: 22px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            text-align: center;
            width: 100%;
        }

        .btn-confirm {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 10px 25px rgba(47, 92, 255, 0.25);
        }
        .btn-confirm:active { transform: scale(0.97); opacity: 0.9; }
        .btn-confirm.loading { opacity: 0.6; pointer-events: none; }

        .btn-back {
            background: transparent;
            color: var(--gray-text);
        }
        .btn-back:active { background: #F9F9F9; }

    </style>
</head>
<body>

<div class="container">
    <h1>Всё верно?</h1>

    <div class="summary-card">
        <div class="info-row">
            <span class="label">Студия</span>
            <span class="value" id="res-studio">—</span>
        </div>
        <div class="info-row">
            <span class="label">Дата</span>
            <span class="value" id="res-date">—</span>
        </div>
        <div class="info-row">
            <span class="label">Время</span>
            <span class="value" id="res-time">—</span>
        </div>
        
        <div class="total-section">
            <span class="total-label">Итого к оплате</span>
            <span class="total-price" id="res-price">0 ₽</span>
        </div>
    </div>

    <div class="button-group">
        <button class="btn btn-confirm" id="confirm-btn" onclick="handleConfirm()">Подтвердить бронь</button>
        <button class="btn btn-back" onclick="history.back()">Назад к выбору времени</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Настройки цен (измени под свои)
    const PRICES = {
        'mini': 1500, // Цена за час в Mini
        'plus': 2500  // Цена за час в Plus
    };

    function initCheckout() {
        // Достаем данные из localStorage
        const studio = localStorage.getItem('selectedStudio') || 'mini';
        const date = localStorage.getItem('selectedDate') || 'Не выбрана';
        const slotsRaw = localStorage.getItem('selectedSlots') || '[]';
        const slots = JSON.parse(slotsRaw);

        // 1. Отображаем студию
        document.getElementById('res-studio').innerText = studio === 'plus' ? 'Studio Plus' : 'Studio Mini';

        // 2. Отображаем дату (приводим к красивому виду)
        document.getElementById('res-date').innerText = date;

        // 3. Отображаем время (интервал от первого до последнего слота)
        if (slots.length > 0) {
            // Сортируем слоты на всякий случай
            slots.sort((a, b) => a - b);
            
            const startRaw = slots[0];
            const endRaw = slots[slots.length - 1] + 1;

            // Превращаем 24, 25, 26... в 00, 01, 02...
            const startHour = startRaw % 24;
            const endHour = endRaw % 24;

            // Форматируем, чтобы всегда было две цифры (03:00 вместо 3:00)
            const startTimeStr = String(startHour).padStart(2, '0') + ':00';
            const endTimeStr = String(endHour).padStart(2, '0') + ':00';

            document.getElementById('res-time').innerText = `${startTimeStr} — ${endTimeStr}`;
            
            // 4. Считаем стоимость
            const total = slots.length * PRICES[studio];
            document.getElementById('res-price').innerText = `${total.toLocaleString()} ₽`;
        }
    }

    async function handleConfirm() {
        const btn = document.getElementById('confirm-btn');
        btn.classList.add('loading');
        btn.innerText = 'Секунду...';

        // Формируем финальный объект для n8n
        const studio = localStorage.getItem('selectedStudio');
        const date = localStorage.getItem('selectedDate');
        const slots = JSON.parse(localStorage.getItem('selectedSlots'));

        const finalData = {
            user: tg.initDataUnsafe.user,
            studio: studio,
            // rawDate: localStorage.getItem('selectedDateRaw'),
            startDate: localStorage.getItem('rawDateStart'), // 2026-04-16T10:00
            endDate: localStorage.getItem('rawDateEnd'),
            date: date,
            slots: slots,
            totalPrice: slots.length * PRICES[studio]
        };

        try {
            // Твой вебхук для финальной записи в базу
            const response = await fetch('https://n8ndex.ru/webhook/4b890fd5-6b71-480b-9c18-60eb4d5a9138', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(finalData)
            });

            if (response.ok) {
                // Очищаем память после успеха
                localStorage.clear();
                window.location.href = 'final.html'; 
            } else {
                throw new Error();
            }
        } catch (e) {
            tg.showAlert("Произошла ошибка при сохранении брони.");
            btn.classList.remove('loading');
            btn.innerText = 'Подтвердить бронь';
        }
    }

    initCheckout();
</script>
</body>
</html>
