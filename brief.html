<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бриф проекта</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #2F5CFF;
            --bg: #ffffff;
            --secondary-bg: #F2F5FF;
            --text-main: #000000;
            --text-gray: #8E8E93;
            --border: #EFEFEF;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            padding: 30px 20px 120px 20px;
            -webkit-tap-highlight-color: transparent;
        }

        h1 { font-size: 34px; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 8px; line-height: 1.1; }
        .subtitle { font-size: 16px; color: var(--text-gray); margin-bottom: 40px; font-weight: 500; }

        .section-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-gray);
            margin-bottom: 20px;
            display: block;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 40px;
        }

        .option-card {
            background: #fff;
            border: 1px solid var(--border);
            padding: 20px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
            user-select: none;
        }

        .option-card.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(47, 92, 255, 0.25);
            transform: translateY(-2px);
        }

        .comment-area {
            width: 100%;
            height: 160px;
            background: var(--secondary-bg);
            border: none;
            border-radius: 24px;
            padding: 20px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 500;
            box-sizing: border-box;
            resize: none;
            outline: none;
        }

        .footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 20px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .btn {
            height: 64px;
            border-radius: 20px;
            border: none;
            font-weight: 800;
            font-size: 17px;
            cursor: pointer;
        }

        .btn-next { flex: 1; background: var(--primary); color: white; }
        .btn-back { width: 64px; background: #F2F2F7; color: black; }

        /* Стиль для специальных кнопок */
        #key-option {
            grid-column: span 2;
            border: 2px dashed var(--border);
            background: #fafafa;
        }
        #key-option.active {
            border: 2px solid var(--primary);
            background: var(--primary);
        }
    </style>
</head>
<body>

    <h1>Детали проекта</h1>
    <p class="subtitle">Они нужны, чтобы мы могли рассчитать стоимость и подобрать идеальное время. Напишем тебе ASAP!</p>

    <span class="section-label">1. Тип работы</span>
    <div class="options-grid" id="type-grid">
        <div class="option-card task-type" data-value="Запись вокала" onclick="toggleTask(this)">Запись вокала</div>
        <div class="option-card task-type" data-value="Сведение и мастеринг" onclick="toggleTask(this)">Сведение и мастеринг</div>
        <div class="option-card task-type" data-value="Создание бита" onclick="toggleTask(this)">Создание бита</div>
        <div class="option-card" data-value="Обучение" onclick="this.classList.toggle('active')">Обучение</div>
        
        <div class="option-card task-type-full" id="key-option" data-value="Трек под ключ" onclick="toggleFullProject(this)">
            <span>Трек под ключ</span>
        </div>
    </div>

    <span class="section-label">2. Желаемый результат</span>
    <div class="options-grid">
        <div class="option-card result-type" onclick="selectSingle(this)">Сингл</div>
        <div class="option-card result-type" onclick="selectSingle(this)">EP</div>
        <div class="option-card result-type" onclick="selectSingle(this)">Альбом</div>
        <div class="option-card result-type" onclick="selectSingle(this)">Другое</div>
    </div>

    <span class="section-label">3. Комментарий</span>
    <textarea class="comment-area" id="user-comment" placeholder="Опиши свою идею, референсы или пожелания..."></textarea>

    <div class="footer">
        <button class="btn btn-back" onclick="history.back()">‹</button>
        <button class="btn btn-next" onclick="saveAndNext()">Продолжить</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function toggleTask(el) {
        el.classList.toggle('active');
        checkFullProjectStatus();
    }

    function checkFullProjectStatus() {
        const tasks = document.querySelectorAll('.task-type');
        const activeTasks = document.querySelectorAll('.task-type.active');
        const keyOption = document.getElementById('key-option');

        if (activeTasks.length === 3) {
            keyOption.classList.add('active');
        } else {
            keyOption.classList.remove('active');
        }
    }

    function toggleFullProject(el) {
        const isNowActive = el.classList.toggle('active');
        const tasks = document.querySelectorAll('.task-type');
        
        tasks.forEach(t => {
            if (isNowActive) t.classList.add('active');
            else t.classList.remove('active');
        });
    }

    function selectSingle(el) {
        document.querySelectorAll('.result-type').forEach(card => card.classList.remove('active'));
        el.classList.add('active');
    }

    // ГЛАВНАЯ ФУНКЦИЯ КНОПКИ
    function saveAndNext() {
        const allActive = Array.from(document.querySelectorAll('.option-card.active, .task-type-full.active'));
        const selectedTasks = allActive.map(t => t.getAttribute('data-value') || t.innerText);
        
        const selectedResult = document.querySelector('.result-type.active')?.innerText || 'Не выбрано';
        const comment = document.getElementById('user-comment').value;

        if (selectedTasks.length === 0) {
            tg.showAlert("Выбери хотя бы один тип работы");
            return;
        }

        // 1. Сохраняем в localStorage, чтобы функция отправки могла их взять
        localStorage.setItem('booking_tasks', JSON.stringify(selectedTasks));
        localStorage.setItem('booking_result', selectedResult);
        localStorage.setItem('booking_comment', comment);

        // 2. Вызываем функцию отправки
        sendDataToWebhook();
    }

    // ФУНКЦИЯ ОТПРАВКИ
    async function sendDataToWebhook() {
        const user = tg.initDataUnsafe?.user || {};
        
        const bookingData = {
            engineer: localStorage.getItem('selectedEngineer'),
            engineerPrice: localStorage.getItem('engineerPrice'), // поправил ключ (был temp_eng_price)
            services: JSON.parse(localStorage.getItem('booking_tasks') || '[]'),
            resultType: localStorage.getItem('booking_result'),
            comment: localStorage.getItem('booking_comment'),
            username: user.username || 'n/a',
            first_name: user.first_name || 'n/a',
            last_name: user.last_name || 'n/a',
            user_id: user.id || 'n/a',
            date: localStorage.getItem('selectedDate') || 'ASAP', 
            time: localStorage.getItem('selectedTime') || 'ASAP',
            studio: localStorage.getItem('selectedStudio') || 'Omni'
        };

        try {
            // Показываем лоадер в кнопке или через интерфейс ТГ, чтобы юзер видел прогресс
            tg.MainButton.showProgress(); 

            const response = await fetch('https://n8ndex.ru/webhook-test/omni-send-brief', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookingData)
            });

            if (response.ok) {
                window.location.href = 'final.html';
            } else {
                tg.showAlert('Ошибка при отправке данных (Код: ' + response.status + ')');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            tg.showAlert('Ошибка сети. Проверьте соединение.');
        } finally {
            tg.MainButton.hideProgress();
        }
    }
</script>
</body>
</html>
