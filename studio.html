<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выбор студии</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #2F5CFF;
            --bg-color: #ffffff;
            --secondary-bg: #F0F4FF;
            --text-color: #000000;
            --card-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color: var(--text-color);
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 400px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .back-to-main {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--primary-color);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: opacity 0.2s;
            padding: 5px 0;
        }
        .back-to-main span { font-size: 24px; line-height: 0; margin-top: -2px; }

        h1 { font-size: 38px; font-weight: 800; line-height: 1.1; margin: 30px 0 35px 0; letter-spacing: -1.5px; }

        .choice-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .studio-card {
            background: #fff;
            border-radius: 35px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            border: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .studio-card:active { transform: scale(0.96); background: var(--secondary-bg); }

        .studio-info h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .studio-info p {
            margin: 5px 0 0;
            color: #888;
            font-weight: 500;
            font-size: 14px;
        }

        .arrow-icon {
            width: 45px;
            height: 45px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(47, 92, 255, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="back-to-main" onclick="location.href='index.html'">
        <span>‹</span> На главную
    </div>

    <h1>Какую студию <br>выберем?</h1>

    <div class="choice-grid">
        <div class="studio-card" onclick="selectStudio('mini')">
            <div class="studio-info">
                <h2>Studio Mini</h2>
                <p>Уютное пространство для двоих</p>
            </div>
            <div class="arrow-icon">›</div>
        </div>

        <div class="studio-card" onclick="selectStudio('plus')">
            <div class="studio-info">
                <h2>Studio Plus</h2>
                <p>Просторный зал для команд</p>
            </div>
            <div class="arrow-icon">›</div>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function selectStudio(type) {
        // Передаем тип студии в URL, чтобы booking.html знал, какую базу проверять
        location.href = `booking.html?studio=${type}`;
    }
</script>
</body>
</html>
