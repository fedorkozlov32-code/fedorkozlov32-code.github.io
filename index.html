<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omni Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #2F5CFF;
            --bg: #ffffff;
            --secondary-bg: #F2F5FF;
            --text-main: #000000;
            --text-gray: #9BA1B0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px 24px;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 400px;
            animation: appAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes appAppear {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        header {
            margin-bottom: 35px;
            text-align: left;
        }

        .logo-wrapper {
            margin-bottom: 25px;
            display: inline-block;
        }

        /* Увеличенный логотип */
        .studio-logo {
            width: 120px; 
            height: auto;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.08));
        }

        /* Уменьшенный текст заголовка */
        h1 {
            font-size: 34px;
            font-weight: 900;
            line-height: 1.1;
            margin: 0 0 8px 0;
            letter-spacing: -1.5px;
        }

        /* Совсем маленький сабтайтл */
        .studio-tag {
            font-size: 15px;
            color: var(--text-gray);
            font-weight: 600;
            letter-spacing: -0.2px;
            opacity: 0.8;
        }

        .menu-grid {
            display: grid;
            gap: 14px;
        }

        .menu-item {
            background: var(--secondary-bg);
            padding: 26px 22px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .menu-item.primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 25px rgba(47, 92, 255, 0.25);
        }

        .menu-item:active {
            transform: scale(0.97);
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item-title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .item-desc {
            font-size: 13px;
            opacity: 0.6;
            font-weight: 500;
        }

        .icon-box {
            font-size: 24px;
            background: rgba(255, 255, 255, 0.15);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
        }

        .menu-item:not(.primary) .icon-box {
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-wrapper">
            <img src="img/omnilogo.png" alt="Omni Logo" class="studio-logo"> <!--[cite: 5] -->
        </div>
        <h1>Выбери услугу</h1>
        <div class="studio-tag">Студия звукозаписи Omni</div> <!--[cite: 5] -->
    </header>

    <div class="menu-grid">
        <a href="studio.html" class="menu-item primary">
            <div class="item-info">
                <span class="item-title">Аренда студии</span>
                <span class="item-desc">Только помещение и звук</span>
            </div>
            <div class="icon-box">🎹</div>
        </a>

        <a href="engineers.html" class="menu-item">
            <div class="item-info">
                <span class="item-title">С инженером</span>
                <span class="item-desc">Запись + помощь профи</span>
            </div>
            <div class="icon-box">🎙️</div>
        </a>

        <a href="price.html" class="menu-item">
            <div class="item-info">
                <span class="item-title">Прайс-лист</span>
                <span class="item-desc">Цены на все услуги</span>
            </div>
            <div class="icon-box">🧾</div>
        </a>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.headerColor = '#ffffff';
</script>

</body>
</html>
