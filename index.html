<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #2F5CFF;
            --bg-color: #ffffff;
            --secondary-bg: #F8F8F8;
            --text-color: #000000;
            --card-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-align: left;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Стиль логотипа */
        .logo-container {
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .studio-logo {
            width: 80px;
            height: auto;
            border-radius: 18px;
        }

        h1 {
            font-size: 42px;
            font-weight: 800;
            line-height: 1.1;
            margin: 0 0 10px 0;
            letter-spacing: -1.5px;
        }

        p {
            color: #888;
            font-size: 17px;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .menu-item {
            background: var(--secondary-bg);
            padding: 24px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            border: 1px solid transparent;
        }

        .menu-item.primary {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 15px 30px rgba(47, 92, 255, 0.25);
        }

        .menu-item:active {
            transform: scale(0.96);
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .item-desc {
            font-size: 14px;
            opacity: 0.7;
        }

        .icon {
            font-size: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Логотип Omni -->
    <div class="logo-container">
        <img src="img/omnilogo.jpg" alt="Omni Logo" class="studio-logo">
    </div>

    <h1>Выбери <br>услугу</h1>
    <p>Студия звукозаписи Omni</p>

    <div class="menu-grid">
        <a href="studio.html" class="menu-item primary">
            <div class="item-info">
                <span class="item-title">Аренда студии</span>
                <span class="item-desc">Только помещение и звук</span>
            </div>
            <span class="icon">🎹</span>
        </a>

        <a href="engineers.html" class="menu-item">
            <div class="item-info">
                <span class="item-title">С инженером</span>
                <span class="item-desc">Запись + помощь профи</span>
            </div>
            <span class="icon">🎙️</span>
        </a>

        <a href="price.html" class="menu-item">
            <div class="item-info">
                <span class="item-title">Прайс-лист</span>
                <span class="item-desc">Цены на все услуги</span>
            </div>
            <span class="icon">🧾</span>
        </a>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.BackButton.hide();
</script>

</body>
</html>
