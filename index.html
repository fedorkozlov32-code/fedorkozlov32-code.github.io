<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Booking</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #2F5CFF;
            --bg-color: #ffffff;
            --text-color: #000000;
            --disabled-bg: #F8F8F8;
            --disabled-text: #D0D0D0;
            --inactive-text: #888888;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 400px; }
        
        h1 { font-size: 42px; font-weight: 700; line-height: 1.1; margin: 20px 0 40px 0; }

        .card {
            background: #fff;
            border-radius: 35px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
        }

        /* Calendar */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: capitalize;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }

        .weekday { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
        
        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
        }

        .day.past { color: var(--disabled-text); cursor: default; }
        .day.today { font-weight: 800; text-decoration: underline; }
        .day.selected { background: var(--primary-color) !important; color: white !important; }
        .day:not(.past):hover { background: #f0f0f0; }

        /* Time Grid */
        .time-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .time-slot {
            background: var(--disabled-bg);
            padding: 14px 0;
            border-radius: 18px;
            font-size: 13px;
            color: var(--inactive-text);
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .time-slot.selected { background: var(--primary-color); color: white; }

        /* Button */
        .next-btn {
            margin-top: 30px;
            width: 100%;
            padding: 20px;
            border-radius: 22px;
            border: none;
            background: var(--disabled-bg);
            color: var(--disabled-text);
            font-size: 18px;
            font-weight: 600;
            transition: 0.3s;
        }

        .next-btn.active { background: var(--primary-color); color: white; cursor: pointer; }
        
        .hidden { display: none; }
        .nav-arrow { color: #ccc; cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="step-date">
        <h1>Выбери дату записи</h1>
        <div class="card">
            <div class="calendar-header">
                <span class="nav-arrow" onclick="changeMonth(-1)">＜</span>
                <span id="month-label">Март 2026</span>
                <span class="nav-arrow" onclick="changeMonth(1)">＞</span>
            </div>
            <div class="days-grid" id="calendar-days"></div>
            <button id="btn-to-time" class="next-btn">далее</button>
        </div>
    </div>

    <div id="step-time" class="hidden">
        <h1>Выбери время записи</h1>
        <div class="card">
            <div class="calendar-header">
                <span class="nav-arrow" onclick="showStep(1)">＜</span>
                <span id="selected-date-title">15 марта 2026</span>
                <span></span>
            </div>
            <div class="time-grid" id="time-container"></div>
            <button id="btn-finish" class="next-btn">далее</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let currentViewDate = new Date(); // Дата для отображения календаря
    let selectedFullDate = null;     // Выбранная дата (объект)
    let selectedSlots = [];          // Массив выбранных временных слотов

    const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
    const monthNamesGenitive = ["января", "февраля", "марта", "апреля", "мая", "июня", "июля", "августа", "сентября", "октября", "ноября", "декабря"];

    function init() {
        renderCalendar();
        document.getElementById('btn-to-time').onclick = () => { if(selectedFullDate) showStep(2); };
        document.getElementById('btn-finish').onclick = () => { if(selectedSlots.length > 0) sendToBot(); };
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-days');
        const label = document.getElementById('month-label');
        grid.innerHTML = '';
        
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        label.innerText = `${monthNames[month]} ${year}`;

        // Дни недели
        ['пн','вт','ср','чт','пт','сб','вс'].forEach(d => {
            const div = document.createElement('div');
            div.className = 'weekday';
            div.innerText = d;
            grid.appendChild(div);
        });

        const firstDay = new Date(year, month, 1).getDay();
        const offset = firstDay === 0 ? 6 : firstDay - 1;
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const today = new Date();
        today.setHours(0,0,0,0);

        // Пустые ячейки (дни прошлого месяца)
        for(let i=0; i<offset; i++) grid.appendChild(document.createElement('div'));

        for(let d=1; d<=daysInMonth; d++) {
            const dateObj = new Date(year, month, d);
            const el = document.createElement('div');
            el.className = 'day';
            el.innerText = d;

            if (dateObj < today) {
                el.classList.add('past');
            } else {
                if (dateObj.getTime() === today.getTime()) el.classList.add('today');
                if (selectedFullDate && dateObj.getTime() === selectedFullDate.getTime()) el.classList.add('selected');
                
                el.onclick = () => {
                    selectedFullDate = dateObj;
                    renderCalendar();
                    document.getElementById('btn-to-time').classList.add('active');
                };
            }
            grid.appendChild(el);
        }
    }

    function renderTimeSlots() {
        const container = document.getElementById('time-container');
        container.innerHTML = '';
        selectedSlots = [];
        document.getElementById('btn-finish').classList.remove('active');

        for (let i = 0; i < 24; i++) {
            const start = i < 10 ? `0${i}:00` : `${i}:00`;
            const end = (i + 1) < 10 ? `0${i+1}:00` : (i+1 === 24 ? '00:00' : `${i+1}:00`);
            const timeStr = `${start} - ${end}`;
            
            const btn = document.createElement('button');
            btn.className = 'time-slot';
            btn.innerText = timeStr;
            
            btn.onclick = () => {
                if (selectedSlots.includes(timeStr)) {
                    selectedSlots = selectedSlots.filter(s => s !== timeStr);
                    btn.classList.remove('selected');
                } else {
                    selectedSlots.push(timeStr);
                    btn.classList.add('selected');
                }
                
                const finishBtn = document.getElementById('btn-finish');
                selectedSlots.length > 0 ? finishBtn.classList.add('active') : finishBtn.classList.remove('active');
            };
            container.appendChild(btn);
        }
    }

    function showStep(step) {
        if (step === 2) {
            document.getElementById('step-date').classList.add('hidden');
            document.getElementById('step-time').classList.remove('hidden');
            document.getElementById('selected-date-title').innerText = `${selectedFullDate.getDate()} ${monthNamesGenitive[selectedFullDate.getMonth()]} ${selectedFullDate.getFullYear()}`;
            renderTimeSlots();
        } else {
            document.getElementById('step-time').classList.add('hidden');
            document.getElementById('step-date').classList.remove('hidden');
        }
    }

    function changeMonth(dir) {
        currentViewDate.setMonth(currentViewDate.getMonth() + dir);
        renderCalendar();
    }

    function sendToBot() {
        const result = {
            date: selectedFullDate.toISOString().split('T')[0],
            slots: selectedSlots.sort()
        };
        tg.sendData(JSON.stringify(result));
        tg.close();
    }

    init();
</script>
</body>
</html>
