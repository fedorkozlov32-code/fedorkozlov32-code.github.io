<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Booking Studio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #2F5CFF;
            --bg-color: #ffffff;
            --secondary-bg: #F5F5F5;
            --text-color: #000000;
            --disabled-color: #F8F8F8;
            --disabled-text: #E0E0E0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .card {
            background: #FFFFFF;
            border-radius: 35px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            text-align: center;
        }

        /* Calendar Styles */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .weekday {
            font-size: 14px;
            font-weight: 700;
            color: #000;
            margin-bottom: 10px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .day.selected {
            background-color: var(--primary-color);
            color: white;
        }

        .day.empty { color: #CCC; }

        /* Time Grid Styles */
        .time-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .time-slot {
            background-color: var(--disabled-color);
            padding: 12px 5px;
            border-radius: 15px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .time-slot.selected {
            background-color: var(--primary-color);
            color: white;
        }

        /* Button */
        .next-btn {
            margin-top: 30px;
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background-color: var(--disabled-color);
            color: var(--disabled-text);
            font-size: 18px;
            font-weight: 600;
            cursor: not-allowed;
            transition: 0.3s;
        }

        .next-btn.active {
            background-color: var(--primary-color);
            color: white;
            cursor: pointer;
        }

        .hidden { display: none; }
        
        .nav-arrow { color: #DDD; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="step-date">
        <h1>Выбери дату записи</h1>
        <div class="card">
            <div class="calendar-header">
                <span class="nav-arrow">＜</span>
                <span>Март 2026</span>
                <span class="nav-arrow">＞</span>
            </div>
            <div class="days-grid">
                <div class="weekday">пн</div><div class="weekday">вт</div><div class="weekday">ср</div>
                <div class="weekday">чт</div><div class="weekday">пт</div><div class="weekday">сб</div><div class="weekday">вс</div>
                
                <div class="day empty">27</div><div class="day empty">28</div>
                <div class="day">1</div><div class="day">2</div><div class="day">3</div><div class="day">4</div><div class="day">5</div>
                <div class="day">6</div><div class="day">7</div><div class="day">8</div><div class="day">9</div><div class="day">10</div>
                <div class="day">11</div><div class="day">12</div><div class="day">13</div><div class="day">14</div>
                <div class="day" onclick="selectDay(this, 15)">15</div>
                <div class="day">16</div><div class="day">17</div><div class="day">18</div><div class="day">19</div>
                <div class="day">20</div><div class="day">21</div><div class="day">22</div><div class="day">23</div>
                <div class="day">24</div><div class="day">25</div><div class="day">26</div><div class="day">27</div>
                <div class="day">28</div><div class="day">29</div><div class="day">30</div><div class="day">31</div>
            </div>
            <button id="btn-to-time" class="next-btn" onclick="goToTime()">далее</button>
        </div>
    </div>

    <div id="step-time" class="hidden">
        <h1>Выбери время записи</h1>
        <div class="card">
            <div class="calendar-header">
                <span class="nav-arrow" onclick="goToDate()">＜</span>
                <span id="selected-date-label">15 марта 2026</span>
                <span></span>
            </div>
            <div class="time-grid" id="time-container">
                </div>
            <button id="btn-finish" class="next-btn" onclick="finishBooking()">далее</button>
        </div>
    </div>
</div>

<script>
    let selectedDate = null;
    let selectedTime = null;

    // Инициализация Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand();

    function selectDay(element, day) {
        document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
        element.classList.add('selected');
        selectedDate = day;
        document.getElementById('btn-to-time').classList.add('active');
    }

    function goToTime() {
        if (!selectedDate) return;
        document.getElementById('step-date').classList.add('hidden');
        document.getElementById('step-time').classList.remove('hidden');
        renderTimeSlots();
    }

    function goToDate() {
        document.getElementById('step-time').classList.add('hidden');
        document.getElementById('step-date').classList.remove('hidden');
    }

    function renderTimeSlots() {
        const container = document.getElementById('time-container');
        container.innerHTML = '';
        for (let i = 0; i < 24; i++) {
            const start = i < 10 ? `0${i}:00` : `${i}:00`;
            const end = (i + 1) < 10 ? `0${i+1}:00` : (i+1 === 24 ? '00:00' : `${i+1}:00`);
            const slot = document.createElement('button');
            slot.className = 'time-slot';
            slot.innerText = `${start} - ${end}`;
            slot.onclick = function() {
                document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                this.classList.add('selected');
                selectedTime = this.innerText;
                document.getElementById('btn-finish').classList.add('active');
            };
            container.appendChild(slot);
        }
    }

    function finishBooking() {
        if (!selectedTime) return;
        
        // Отправка данных обратно в бот (для n8n)
        const data = {
            date: `2026-03-${selectedDate}`,
            time: selectedTime
        };
        
        tg.sendData(JSON.stringify(data));
        tg.close();
    }
</script>

</body>
</html>
