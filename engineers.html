<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выбор звукоинженера</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #2F5CFF;
            --bg-color: #ffffff;
            --secondary-bg: #F8FAFF;
            --text-main: #000000;
            --text-secondary: #8E8E93;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --accent-gradient: linear-gradient(135deg, #2F5CFF 0%, #6E8EFF 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        .header { margin-bottom: 30px; padding: 0 10px; }
        .header h1 { font-size: 32px; font-weight: 900; margin: 0; letter-spacing: -1px; }
        .header p { color: var(--text-secondary); margin: 5px 0 0 0; font-size: 16px; font-weight: 500; }

        .eng-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .eng-card {
            background: var(--bg-color);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .eng-card:active { transform: scale(0.96); }

        .img-container { position: relative; width: 100%; height: 180px; }
        .eng-photo { width: 100%; height: 100%; object-fit: cover; }
        
        .price-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 13px;
            color: var(--primary-color);
        }

        .eng-info { padding: 15px; }
        .eng-name { font-weight: 800; font-size: 17px; margin: 0; }
        .eng-nickname { font-weight: 600; font-size: 12px; color: var(--primary-color); text-transform: uppercase; margin: 2px 0 0 0; letter-spacing: 0.5px; }

        /* Стили для кнопки подбора */
        .match-card {
            grid-column: span 2; /* Растягиваем на две колонки */
            background: var(--accent-gradient);
            border-radius: 24px;
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            box-shadow: 0 15px 30px rgba(47, 92, 255, 0.3);
            margin-top: 10px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .match-card:active { transform: scale(0.98); }

        .match-info h2 { font-size: 20px; font-weight: 800; margin: 0; line-height: 1.2; }
        .match-info p { font-size: 14px; font-weight: 500; margin: 5px 0 0 0; opacity: 0.9; }
        .match-icon { font-size: 32px; background: rgba(255,255,255,0.2); width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 18px; }

    </style>
</head>
<body>

<div class="header">
    <h1>Звукари</h1>
    <p>Выбери своего мастера</p>
</div>

<div class="eng-grid">
    <div class="eng-card" onclick="selectEngineer('Misha Omni', 5000)">
        <div class="img-container">
            <img src="img/eng_misha.jpg" alt="Misha" class="eng-photo">
            <div class="price-badge">5000₽</div>
        </div>
        <div class="eng-info">
            <p class="eng-name">Миша</p>
            <p class="eng-nickname">OMNI</p>
        </div>
    </div>

    <div class="eng-card" onclick="selectEngineer('Vanya 1side', 3000)">
        <div class="img-container">
            <img src="img/eng_vanya.jpg" alt="Vanya" class="eng-photo">
            <div class="price-badge">3000₽</div>
        </div>
        <div class="eng-info">
            <p class="eng-name">Ваня</p>
            <p class="eng-nickname">1SIDE</p>
        </div>
    </div>

    <div class="eng-card" onclick="selectEngineer('Serega Slitee', 3000)">
        <div class="img-container">
            <img src="img/eng_serega.jpg" alt="Serega" class="eng-photo">
            <div class="price-badge">3000₽</div>
        </div>
        <div class="eng-info">
            <p class="eng-name">Серега</p>
            <p class="eng-nickname">SLITEE</p>
        </div>
    </div>

    <div class="eng-card" onclick="selectEngineer('Matvey Maite', 3000)">
        <div class="img-container">
            <img src="img/eng_matvey.jpg" alt="Matvey" class="eng-photo">
            <div class="price-badge">3000₽</div>
        </div>
        <div class="eng-info">
            <p class="eng-name">Матвей</p>
            <p class="eng-nickname">MAITE</p>
        </div>
    </div>

    <div class="eng-card" onclick="selectEngineer('Stepa Vivienne', 2500)">
        <div class="img-container">
            <img src="img/eng_stepa.jpg" alt="Stepa" class="eng-photo">
            <div class="price-badge">2500₽</div>
        </div>
        <div class="eng-info">
            <p class="eng-name">Степа</p>
            <p class="eng-nickname">VIVIENNE</p>
        </div>
    </div>

    <div class="eng-card" onclick="selectEngineer('Vlad Sonic', 2000)">
        <div class="img-container">
            <img src="img/eng_vlad.jpg" alt="Vlad" class="eng-photo">
            <div class="price-badge">2000₽</div>
        </div>
        <div class="eng-info">
            <p class="eng-name">Влад</p>
            <p class="eng-nickname">SONIC</p>
        </div>
    </div>

    <button class="match-card" onclick="selectAndBrief()">
        <div class="match-info">
            <h2>Подобрать инженера<br>под мой запрос</h2>
            <p>Мы сами выберем лучшего спеца</p>
        </div>
        <div class="match-icon">🪄</div>
    </button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Функция для выбора конкретного инженера
    function selectEngineer(name, price) {
        localStorage.setItem('temp_eng_name', name);
        localStorage.setItem('temp_eng_price', price);
        window.location.href = 'engineer-details.html';
    }

    // Функция для кнопки "Подобрать"
    function selectAndBrief() {
        // Сохраняем "нужно подобрать" в те же переменные
        localStorage.setItem('selectedEngineer', 'нужно подобрать');
        localStorage.setItem('temp_eng_name', 'нужно подобрать');
        localStorage.setItem('temp_eng_price', 'по запросу');
        
        // Ведём сразу на бриф
        window.location.href = 'brief.html';
    }
</script>

</body>
</html>
